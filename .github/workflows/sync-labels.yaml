name: Sync Labels
on:
  push:
    paths:
      - 'labels.yaml'

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Labels
        uses: micnncim/action-label-syncer@v1
        with:
          manifest: 'labels.yaml'
          repository: |
            Broetec/.github
            Broetec/broetec.github.io
            Broetec/kubesure
          token: ${{ secrets.LABEL_SYNC_TOKEN }}
          prune: true