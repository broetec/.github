name: Bug Report
description: Report unexpected behavior in this repository
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please try the **latest release** or **default branch** before submitting.

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Tell us what went wrong...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How can we reproduce it?
      description: |
        Minimal steps or commands. If the bug involves config files, use the field below (redact secrets).
      placeholder: |
        1. Run '...'
        2. Set config to '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: config_snippet
    attributes:
      label: Config, manifest, or sample input (optional)
      description: |
        Paste only what is needed to reproduce (e.g. YAML, JSON, `.env` excerpt).
        **Remove secrets, tokens, and passwords.**
      render: yaml
      placeholder: |
        # Optional — only if relevant
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### Debug output
        From the project root, run `make debug-info` and paste the **full** output in the next field.

  - type: textarea
    id: debug_output
    attributes:
      label: Output of `make debug-info`
      description: Paste the complete terminal output here.
      render: bash
      placeholder: "Paste output here..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Console errors, stack traces, or `make test` output (redact sensitive data).
      render: bash
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Self-check
      options:
        - label: I have removed sensitive information from logs and pasted material.
          required: true
        - label: I reproduced this on the latest release or default branch.
          required: false
