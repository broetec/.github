name: Feature Request
description: Suggest an idea or improvement for a Broetec project
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thanks for your suggestion!
        We are always looking for ways to improve our tools. Please describe the feature you'd like to see.

  - type: dropdown
    id: area
    attributes:
      label: Target Component
      description: Which part of the project does this feature affect?
      options:
        - Core Engine (Python/Logic)
        - CLI / Commands
        - Documentation
        - CI/CD & DevOps
        - Infrastructure / Kubernetes Integrations
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear and concise description of the friction or limitation you're facing.
      placeholder: "Example: I'm always frustrated when I have to manually sync..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the proposed solution
      description: What should happen? How should the new feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or other ways to achieve this?
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to contribute?
      options:
        - label: I am willing to submit a Pull Request for this feature!