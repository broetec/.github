name: Task / Refactor
description: Technical improvements, documentation, or maintenance tasks
labels: ["type: chore", "type: documentation", "type: improvement"]
body:
  - type: markdown
    attributes:
      value: |
        ### Technical Task
        Use this for internal improvements that don't necessarily change the end-user functionality.

  - type: input
    id: scope
    attributes:
      label: Scope
      description: Briefly state which module or file is being updated.
      placeholder: "e.g., Makefile, src/auth.py, CI Workflow"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What exactly needs to be done?
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Why is this task necessary? (e.g., Performance, Security, Code Quality)
    validations:
      required: true

  - type: checkboxes
    id: todo
    attributes:
      label: Acceptance Criteria / Todo List
      description: What needs to be completed for this task to be closed?
      options:
        - label: Implementation completed
        - label: Tests updated/added (`make test-coverage-ci`)
        - label: Documentation updated
    validations:
      required: false

  - type: textarea
    id: debug_info
    attributes:
      label: Environment Info (Optional)
      description: If this task depends on specific environment details, run `make debug-info` and paste here.
      render: text